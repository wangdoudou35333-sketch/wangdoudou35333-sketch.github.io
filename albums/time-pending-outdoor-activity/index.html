<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>户外活动影像记录 | DOUDOU HOUSE</title>
    <meta name="description" content="DOUDOU HOUSE 活动摄影相册，展示户外活动现场影像记录。">
    <link rel="stylesheet" href="../../styles.css">
  </head>
  <body>
    <header class="site-header" aria-label="网站导航">
      <a class="brand" href="../../index.html">DOUDOU HOUSE</a>
      <nav class="nav-links" aria-label="主要页面">
        <a href="../../index.html">首页</a>
        <a href="../../index.html#albums">相册</a>
        <a href="../../index.html#about">关于</a>
        <a href="../../index.html#contact">联系</a>
      </nav>
    </header>

    <main>
      <section class="project-hero spacious-hero" aria-labelledby="project-title">
        <div class="project-kicker">
          <a class="text-link" href="../../index.html#albums">返回相册列表</a>
          <span>时间待补充 / 活动摄影</span>
        </div>
        <h1 id="project-title">户外活动影像记录</h1>
        <p class="project-lead">以活动现场为核心，记录行进过程、环境氛围、人物状态与关键瞬间。</p>
        <dl class="project-meta" aria-label="项目资料">
          <div>
            <dt>类型</dt>
            <dd>活动摄影</dd>
          </div>
          <div>
            <dt>时间</dt>
            <dd>待补充</dd>
          </div>
          <div>
            <dt>地点</dt>
            <dd>待补充</dd>
          </div>
          <div>
            <dt>照片</dt>
            <dd>当前样片 7 张</dd>
          </div>
        </dl>
      </section>

      <section class="album-viewer" data-album-viewer data-mode="3d" aria-labelledby="album-viewer-title">
        <div class="album-view-toolbar">
          <div>
            <p class="eyebrow">View</p>
            <h2 id="album-viewer-title">观看相册</h2>
          </div>
          <div class="album-view-switch" role="group" aria-label="选择相册观看方式">
            <button type="button" class="album-view-button" data-album-mode="3d" aria-pressed="true">3D 轮播</button>
            <button type="button" class="album-view-button" data-album-mode="masonry" aria-pressed="false">瀑布流</button>
          </div>
        </div>
        <div class="album-stage-shell">
          <button type="button" class="album-stage-control album-stage-prev" data-album-prev aria-label="上一张照片">←</button>
          <div class="album-items" data-album-items>
            <button type="button" class="album-photo" data-album-photo aria-label="放大查看第 1 张照片">
              <img src="../../public/images/albums/time-pending-outdoor-activity/large/cover.webp" alt="户外活动车辆行进记录" loading="eager" fetchpriority="high">
            </button>
            <button type="button" class="album-photo" data-album-photo aria-label="放大查看第 2 张照片">
              <img src="../../public/images/albums/time-pending-outdoor-activity/large/activity-02.webp" alt="户外车队活动现场" loading="lazy">
            </button>
            <button type="button" class="album-photo" data-album-photo aria-label="放大查看第 3 张照片">
              <img src="../../public/images/albums/time-pending-outdoor-activity/large/activity-06.webp" alt="傍晚活动车辆竖幅剪影" loading="lazy">
            </button>
            <button type="button" class="album-photo" data-album-photo aria-label="放大查看第 4 张照片">
              <img src="../../public/images/albums/time-pending-outdoor-activity/large/activity-01.webp" alt="夜间活动烟花现场" loading="lazy">
            </button>
            <button type="button" class="album-photo" data-album-photo aria-label="放大查看第 5 张照片">
              <img src="../../public/images/albums/time-pending-outdoor-activity/large/activity-05.webp" alt="车内视角记录活动烟花" loading="lazy">
            </button>
            <button type="button" class="album-photo" data-album-photo aria-label="放大查看第 6 张照片">
              <img src="../../public/images/albums/time-pending-outdoor-activity/large/activity-03.webp" alt="日落活动车辆剪影" loading="lazy">
            </button>
            <button type="button" class="album-photo" data-album-photo aria-label="放大查看第 7 张照片">
              <img src="../../public/images/albums/time-pending-outdoor-activity/large/activity-07.webp" alt="户外环境活动场景" loading="lazy">
            </button>
          </div>
          <button type="button" class="album-stage-control album-stage-next" data-album-next aria-label="下一张照片">→</button>
          <output class="album-counter" data-album-counter aria-live="polite">01 / 07</output>
        </div>
        <dialog class="album-lightbox" data-album-lightbox aria-label="照片大图查看">
          <button type="button" class="album-lightbox-close" data-lightbox-close aria-label="关闭大图">×</button>
          <button type="button" class="album-lightbox-control album-lightbox-prev" data-lightbox-prev aria-label="上一张大图">←</button>
          <figure>
            <img data-lightbox-image alt="">
            <figcaption data-lightbox-counter aria-live="polite"></figcaption>
          </figure>
          <button type="button" class="album-lightbox-control album-lightbox-next" data-lightbox-next aria-label="下一张大图">→</button>
        </dialog>
      </section>
    </main>

    <footer class="site-footer">
      <span>DOUDOU HOUSE</span>
      <a class="text-link" href="../../index.html#albums">返回相册列表</a>
    </footer>
    <script type="module" src="../../scripts/album-viewer.js"></script>
  </body>
</html>
